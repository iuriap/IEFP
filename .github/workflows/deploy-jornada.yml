name: Deploy Jornada App to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - 'Jornada_Aprendizagem_Informal/app/**'
      - 'Apresentação metodo STAR/**'
      - 'e-portefolio/**'
      - '.github/workflows/deploy-jornada.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Jornada_Aprendizagem_Informal/app/package-lock.json'
      - name: Install dependencies
        working-directory: ./Jornada_Aprendizagem_Informal/app
        run: npm ci
      - name: Build Jornada App
        working-directory: ./Jornada_Aprendizagem_Informal/app
        run: npm run build

      - name: Prepare Multi-Project Deployment
        run: |
          mkdir -p public_html
          cp -a ./Jornada_Aprendizagem_Informal/app/dist/. public_html/
          cp -a "./Apresentação metodo STAR" public_html/apresentacao-metodo-star
          cp -a ./e-portefolio public_html/e-portefolio

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public_html

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
