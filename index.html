                            <div class="relative w-full md:w-1/3 h-2 bg-surface-variant rounded-full overflow-hidden">
                                <div class="absolute top-0 left-0 h-full w-2/3 bg-primary rounded-full"></div>
                            </div>
                        </article>
                    </div>
                    <div class="fixed top-20 -left-40 w-96 h-96 bg-secondary-fixed/20 rounded-full blur-3xl -z-10 pointer-events-none"></div>
                    <div class="fixed bottom-20 -right-40 w-[30rem] h-[30rem] bg-primary-fixed/20 rounded-full blur-3xl -z-10 pointer-events-none"></div>
                </div>
            </main>
        );

        const DifferencesScreen = () => (
            <main class="pb-section-padding px-6 md:px-gutter max-w-container-max mx-auto flex flex-col justify-center min-h-screen relative z-10 pt-section-padding">
                <header class="mb-stack-lg text-center max-w-3xl mx-auto">
                    <h1 class="font-display-lg text-display-lg text-on-surface mb-stack-md text-balance">
                        Diferença entre os tipos de aprendizagem
                    </h1>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8 relative">
                    <div class="hidden md:block absolute top-1/2 left-10 right-10 h-px bg-outline-variant/30 -translate-y-1/2 z-0 pointer-events-none"></div>
                    <article class="bg-surface-variant border border-outline-variant/20 rounded-card p-8 flex flex-col gap-6 shadow-[0_4px_24px_rgba(93,64,55,0.04)] relative z-10 hover:-translate-y-1 transition-transform duration-500">
                        <div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center shadow-inner">
                            <span class="material-symbols-outlined text-on-surface-variant" style={{ fontVariationSettings: "'FILL' 0" }}>account_balance</span>
                        </div>
                        <div>
                            <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Formal</h2>
                            <p class="font-body-md text-body-md text-on-surface-variant">Estruturada, com certificação (ex: escola, universidade)</p>
                        </div>
                    </article>
                    <article class="bg-surface-container border border-outline-variant/30 rounded-card p-8 flex flex-col gap-6 shadow-[0_8px_32px_rgba(93,64,55,0.06)] relative z-10 md:-translate-y-4 hover:-translate-y-5 transition-transform duration-500">
                        <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center shadow-inner">
                            <span class="material-symbols-outlined text-tertiary" style={{ fontVariationSettings: "'FILL' 0" }}>hub</span>
                        </div>
                        <div>
                            <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Não formal</h2>
                            <p class="font-body-md text-body-md text-on-surface-variant">Organizada, mas fora do sistema oficial (ex: cursos livres, workshops)</p>
                        </div>
                    </article>
                    <article class="bg-secondary-container border border-secondary-fixed-dim/40 rounded-card p-8 flex flex-col gap-6 shadow-[0_12px_48px_rgba(93,64,55,0.08)] relative z-10 hover:-translate-y-1 transition-transform duration-500">
                        <div class="w-12 h-12 rounded-full bg-secondary-fixed-dim/30 flex items-center justify-center shadow-inner">
                            <span class="material-symbols-outlined text-on-secondary-container" style={{ fontVariationSettings: "'FILL' 1" }}>spa</span>
                        </div>
                        <div>
                            <h2 class="font-headline-md text-headline-md text-on-secondary-container mb-2">Informal</h2>
                            <p class="font-body-md text-body-md text-on-secondary-container/80">Espontânea, baseada na experiência</p>
                        </div>
                    </article>
                </div>
            </main>
        );

        const ScrollNav = ({ children }) => {
            const navigate = useNavigate();
            const location = useLocation();
            
            useEffect(() => {
                let isNavigating = false;
                const handleWheel = (e) => {
                    if (isNavigating) return;
                    
                    const currentIndex = navItems.findIndex(item => item.path === location.pathname);
                    if (e.deltaY > 40) {
                        if (currentIndex < navItems.length - 1) {
                            isNavigating = true;
                            navigate(navItems[currentIndex + 1].path);
                            setTimeout(() => isNavigating = false, 800);
                        }
                    } else if (e.deltaY < -40) {
                        if (currentIndex > 0) {
                            isNavigating = true;
                            navigate(navItems[currentIndex - 1].path);
                            setTimeout(() => isNavigating = false, 800);
                        }
                    }
                };

                window.addEventListener('wheel', handleWheel);
                return () => window.removeEventListener('wheel', handleWheel);
            }, [location.pathname, navigate]);

            return children;
        };

        const AnimatedRoutes = () => {
            const location = useLocation();
            const [displayLocation, setDisplayLocation] = useState(location);
            const [transitionStage, setTransitionStage] = useState("in");

            useEffect(() => {
                if (location.pathname !== displayLocation.pathname) {
                    setTransitionStage("out");
                    const timer = setTimeout(() => {
                        setDisplayLocation(location);
                        setTransitionStage("in");
                    }, 400);
                    return () => clearTimeout(timer);
                }
            }, [location, displayLocation]);

            return (
                <div className={`transition-all duration-500 ease-in-out transform ${transitionStage === "in" ? "opacity-100 translate-y-0" : "opacity-0 translate-y-8"}`}>
                    <Routes location={displayLocation}>
                        <Route path="/" element={<IntroScreen />} />
                        <Route path="/characteristics" element={<CharacteristicsScreen />} />
                        <Route path="/importance" element={<ImportanceScreen />} />
                        <Route path="/examples" element={<ExamplesScreen />} />
                        <Route path="/differences" element={<DifferencesScreen />} />
                    </Routes>
                </div>
            );
        };

        const App = () => {
            return (
                <MemoryRouter>
                    <ScrollNav>
                        <div className="flex flex-col min-h-screen h-screen overflow-hidden">
                            <SideNavBar />
                            <div className="flex-grow overflow-y-auto hide-scrollbar">
                                <AnimatedRoutes />
                            </div>
                        </div>
                    </ScrollNav>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
